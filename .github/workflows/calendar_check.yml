name: Calendar Check

# Triggered by cron-job.org every 5 minutes via repository_dispatch.
# One-time setup required: update cron-job.org job 7866088 so its request
# body is {"event_type":"tidbyt-check"} (instead of "tidbyt-push") to
# redirect the heartbeat here. render.yml handles "tidbyt-push" events.
on:
  repository_dispatch:
    types: [tidbyt-check]
  workflow_dispatch:  # manual trigger for testing

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # allows committing ledger.json back to the repo
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install icalendar recurring-ical-events

      - name: Run calendar check
        env:
          ICAL_URL: ${{ secrets.ICAL_URL }}
          ICAL_URL_PERSONAL: ${{ secrets.ICAL_URL_PERSONAL }}
          CRONJOB_API_KEY: ${{ secrets.CRONJOB_API_KEY }}
          DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          PREP_TIME: ${{ secrets.PREP_TIME }}
          ALERT_WINDOW: ${{ secrets.ALERT_WINDOW }}
          PERSISTENCE_TIME: ${{ secrets.PERSISTENCE_TIME }}
          EXTENDED_THRESHOLD: ${{ secrets.EXTENDED_THRESHOLD }}
        run: python3 calendar_check.py

      - name: Commit ledger if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ledger.json
          git diff --staged --quiet && echo "Ledger unchanged" || \
            git commit -m "chore: update render schedule ledger [skip ci]" && git push
