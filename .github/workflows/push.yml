name: Push to Tidbyt

on:
  # Manual fallback only. render.yml is the sole handler for repository_dispatch
  # (cron-job.org-triggered) renders. Use this workflow from the Actions tab
  # when you need to force a render without touching the smart scheduler.
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Render and push to Tidbyt
        env:
          ICAL_URL: ${{ secrets.ICAL_URL }}
          TIDBYT_TOKEN_1: ${{ secrets.TIDBYT_TOKEN_1 }}
          TIDBYT_TOKEN_2: ${{ secrets.TIDBYT_TOKEN_2 }}
        run: |
          chmod +x push.sh
          ./push.sh
